<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a1a;
    --bg2: #1a0a2e;
    --accent: #a855f7;
    --accent-pink: #ec4899;
    --accent-orange: #f59e0b;
    --text: #e0e0e0;
    --text-secondary: #8a8a9a;
    --text-muted: #5a5a6a;
    --footer-text: #3a3a4a;
    --footer-link: #6a6a7a;
    --footer-link-hover: #c0c0d0;
    --footer-border: #1a1a2a;
    --logo-color: #a855f7;
  }

  html {
    height: 100%;
    background: var(--bg);
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    margin: 0;
    padding: 1.5rem 1.5rem 0 1.5rem;
    background: radial-gradient(circle at 20% 20%, #1a0a3e 0%, var(--bg) 60%);
    color: #fff;
    font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: -0.01em;
  }

  .app-wrapper {
    display: flex;
    flex-direction: column;
    flex: 1 0 auto;
    width: 100%;
    max-width: 1000px;
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
    z-index: 1;
  }

  .page-content {
    flex: 1 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    width: 100%;
    padding-top: clamp(2rem, 8vh, 5rem);
    padding-bottom: 4rem;
  }

  .header {
    text-align: center;
    margin-bottom: 1.5rem;
    width: 100%;
  }

  .logo {
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--logo-color);
    text-transform: uppercase;
    margin-bottom: 16px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon { font-size: 16px; }

  h1 {
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 300;
    background: linear-gradient(135deg, #ffffff 0%, #c87aff 50%, #ff6ec7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { filter: hue-rotate(0deg); }
    50% { filter: hue-rotate(20deg); }
  }

  .subtitle {
    color: rgba(255, 255, 255, 0.5);
    font-size: clamp(13px, 2vw, 15px);
    font-weight: 300;
    line-height: 1.5;
    max-width: 500px;
    margin: 0 auto;
  }

  .footer {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.7rem;
    color: var(--footer-text);
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    padding: 1.8rem 1rem 3rem;
    border-top: 1px solid var(--footer-border);
    margin-top: auto;
  }

  .footer .links {
    display: flex;
    gap: 2.2rem;
    flex-wrap: nowrap;
    justify-content: center;
    white-space: nowrap;
  }

  .footer a {
    color: var(--footer-link);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-thickness: 1px;
    text-decoration-color: transparent;
    transition: text-decoration-color 0.25s, color 0.25s;
    font-weight: 400;
    letter-spacing: 0.02em;
  }
  .footer a:hover {
    color: var(--footer-link-hover);
    text-decoration-color: currentColor;
  }

  .wheel-wrap {
    position: relative;
    width: min(90vw, 520px);
    aspect-ratio: 1;
    margin: 0 auto;
  }
  svg { width: 100%; height: 100%; overflow: visible; }

  .sector {
    cursor: pointer;
    transition: filter 0.3s ease;
  }
  .sector:hover { filter: brightness(1.3) drop-shadow(0 0 12px currentColor); }
  .sector-fill {
    transition: d 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .center-circle {
    fill: rgba(10, 10, 26, 0.85);
    stroke: url(#centerGrad);
    stroke-width: 2;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.5)); }
    50% { filter: drop-shadow(0 0 20px rgba(236, 72, 153, 0.8)); }
  }

  .center-text {
    fill: #fff;
    font-size: 36px;
    font-weight: 200;
    text-anchor: middle;
    dominant-baseline: middle;
  }
  .center-label {
    fill: rgba(255,255,255,0.5);
    font-size: 10px;
    text-anchor: middle;
    letter-spacing: 2px;
  }

  .sector-label {
    fill: #fff;
    font-size: 12px;
    font-weight: 500;
    text-anchor: middle;
    pointer-events: none;
  }

  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal.active { display: flex; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 32px;
    width: 90%;
    max-width: 380px;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal-title {
    font-size: 1.3rem;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-dot { width: 14px; height: 14px; border-radius: 50%; }
  .modal-desc { opacity: 0.7; font-size: 0.9rem; margin-bottom: 24px; line-height: 1.5; }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    cursor: pointer;
    box-shadow: 0 0 16px rgba(168, 85, 247, 0.6);
  }
  input[type=range]::-moz-range-thumb {
    width: 28px; height: 28px; border: none;
    border-radius: 50%;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    cursor: pointer;
  }
  .value-display {
    font-size: 2rem;
    font-weight: 200;
    min-width: 50px;
    text-align: center;
  }

  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, #a855f7, #ec4899);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(168, 85, 247, 0.4);
  }

  .controls {
    margin-top: 30px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .ghost-btn {
    padding: 12px 20px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    color: #fff;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: inherit;
  }
  .ghost-btn:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.3);
  }
  .ghost-btn.primary {
    background: linear-gradient(90deg, rgba(168, 85, 247, 0.3), rgba(236, 72, 153, 0.3));
    border-color: rgba(168, 85, 247, 0.5);
  }
  .ghost-btn.primary:hover {
    background: linear-gradient(90deg, rgba(168, 85, 247, 0.5), rgba(236, 72, 153, 0.5));
  }

  .share-menu {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 200;
  }
  .share-menu.active { display: flex; animation: fadeIn 0.3s ease; }
  
  .share-menu-card {
    background: rgba(30, 20, 50, 0.95);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 28px 28px 0 0;
    padding: 28px 24px 36px;
    width: 100%;
    max-width: 420px;
    animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  @media (min-width: 600px) {
    .share-menu { align-items: center; }
    .share-menu-card { border-radius: 28px; }
  }
  
  .share-menu-title {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 400;
    margin-bottom: 24px;
    opacity: 0.9;
  }
  .share-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }
  .share-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.2s;
    color: #fff;
    font-size: 0.95rem;
    font-family: inherit;
  }
  .share-item:hover {
    background: rgba(255,255,255,0.12);
    transform: translateX(4px);
  }
  .share-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }
  .share-item-label { flex: 1; }
  .share-item-hint {
    font-size: 0.75rem;
    opacity: 0.5;
  }
  .share-cancel {
    width: 100%;
    padding: 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    color: #fff;
    cursor: pointer;
    font-size: 0.9rem;
    margin-top: 8px;
    font-family: inherit;
  }

  .recommendations-panel {
    position: fixed;
    right: -450px;
    top: 50%;
    transform: translateY(-50%);
    width: 420px;
    max-height: 85vh;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px 0 0 24px;
    padding: 32px;
    z-index: 50;
    transition: right 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow-y: auto;
  }
  .recommendations-panel.active { right: 0; }
  .rec-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .rec-title {
    font-size: 1.3rem;
    font-weight: 300;
  }
  .rec-title-text {
    background: linear-gradient(90deg, #a855f7, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .rec-title-emoji {
    -webkit-text-fill-color: initial !important;
    background: none !important;
    -webkit-background-clip: initial !important;
    background-clip: initial !important;
  }
  .rec-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.2s;
    font-family: inherit;
  }
  .rec-close:hover {
    background: rgba(255,255,255,0.2);
    transform: rotate(90deg);
  }

  .rec-section { margin-bottom: 24px; }
  .rec-section-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: 0.5;
    margin-bottom: 12px;
  }
  .rec-item {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    animation: slideIn 0.4s ease;
  }
  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .rec-item-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .rec-item-icon {
    font-size: 1.5rem;
    filter: none !important;
    -webkit-text-fill-color: initial !important;
  }
  .rec-item-title { font-size: 1rem; font-weight: 500; }
  .rec-item-value {
    margin-left: auto;
    font-size: 1.1rem;
    font-weight: 200;
    opacity: 0.7;
  }
  .rec-item-text {
    font-size: 0.9rem;
    line-height: 1.6;
    opacity: 0.88;
  }

  .balance-indicator {
    background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(236, 72, 153, 0.2));
    border: 1px solid rgba(168, 85, 247, 0.3);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 20px;
    text-align: center;
  }
  .balance-score {
    font-size: 2.2rem;
    font-weight: 200;
    margin-bottom: 6px;
  }
  .balance-label {
    font-size: 0.75rem;
    opacity: 0.7;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .balance-summary {
    margin-top: 14px;
    font-size: 0.9rem;
    line-height: 1.5;
    opacity: 0.85;
    text-align: left;
  }

  .next-step-card {
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(6, 182, 212, 0.15));
    border: 1px solid rgba(16, 185, 129, 0.3);
    border-radius: 16px;
    padding: 18px;
  }
  .next-step-title {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: 0.7;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .next-step-text {
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .ai-loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 24px;
  }
  .ai-loader-orb {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #a855f7, #ec4899);
    position: relative;
    animation: orbPulse 1.5s ease-in-out infinite;
  }
  .ai-loader-orb::before,
  .ai-loader-orb::after {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 2px solid rgba(168, 85, 247, 0.3);
    animation: orbRing 2s ease-out infinite;
  }
  .ai-loader-orb::after { animation-delay: 1s; }
  @keyframes orbPulse {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.1); filter: brightness(1.3); }
  }
  @keyframes orbRing {
    0% { transform: scale(0.8); opacity: 1; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  .ai-loader-text {
    font-size: 0.95rem;
    opacity: 0.7;
    text-align: center;
    letter-spacing: 0.5px;
  }
  .ai-loader-dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  .cache-hint {
    font-size: 0.75rem;
    opacity: 0.4;
    text-align: center;
    margin-top: 16px;
    font-style: italic;
  }

  .wallpaper-render {
    position: fixed;
    left: -9999px;
    top: 0;
    width: 2560px;
    height: 1440px;
    background: radial-gradient(ellipse at 30% 30%, #2a1a4e 0%, #0a0a1a 70%);
    overflow: hidden;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    color: #fff;
  }
  .wallpaper-render::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 20% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
  }
  .wp-inner {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px;
  }
  .wp-title {
    font-size: 72px;
    font-weight: 200;
    letter-spacing: 8px;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #a855f7, #ec4899, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .wp-date {
    font-size: 28px;
    opacity: 0.5;
    margin-bottom: 60px;
    letter-spacing: 3px;
  }
  .wp-wheel-container {
    width: 720px;
    height: 720px;
    margin-bottom: 60px;
  }
  .wp-wheel-container svg { width: 100%; height: 100%; }
  .wp-stats {
    display: flex;
    gap: 80px;
    margin-bottom: 60px;
  }
  .wp-stat { text-align: center; }
  .wp-stat-value {
    font-size: 64px;
    font-weight: 200;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .wp-stat-label {
    font-size: 18px;
    opacity: 0.5;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .wp-areas {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px 48px;
    max-width: 1400px;
  }
  .wp-area {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 24px;
  }
  .wp-area-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .wp-area-name { opacity: 0.85; flex: 1; }
  .wp-area-value { font-weight: 300; opacity: 0.6; }
  .wp-footer {
    position: absolute;
    bottom: 60px;
    right: 120px;
    font-size: 20px;
    opacity: 0.3;
    letter-spacing: 2px;
  }

  .particle {
    position: fixed;
    width: 4px; height: 4px;
    background: rgba(168, 85, 247, 0.5);
    border-radius: 50%;
    pointer-events: none;
    animation: float var(--duration) linear infinite;
    animation-delay: var(--delay);
  }
  @keyframes float {
    0% { 
      transform: translateY(100vh) translateX(0) scale(0); 
      opacity: 0; 
    }
    10% { 
      opacity: 0.6; 
      transform: translateY(90vh) translateX(10px) scale(0.5);
    }
    50% {
      transform: translateY(50vh) translateX(-10px) scale(0.8);
      opacity: 0.8;
    }
    90% { 
      opacity: 0.6; 
      transform: translateY(10vh) translateX(10px) scale(1);
    }
    100% { 
      transform: translateY(-10vh) translateX(0) scale(1); 
      opacity: 0; 
    }
  }

  .confetti {
    position: fixed;
    width: 8px; height: 14px;
    top: -20px;
    pointer-events: none;
    animation: confettiFall 3s linear forwards;
  }
  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(30, 20, 50, 0.95);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 14px 24px;
    color: #fff;
    font-size: 0.9rem;
    z-index: 300;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 768px) {
    body {
      padding: 0.8rem 0.8rem 0 0.8rem;
      min-height: 100dvh;
    }
    .page-content {
      padding-top: clamp(1.5rem, 8vh, 4rem);
      padding-bottom: 3rem;
    }
    .wheel-wrap { width: 95vw; }
    .recommendations-panel {
      width: 95vw;
      right: -100vw;
      max-height: 85vh;
      border-radius: 24px 24px 0 0;
      bottom: 0;
      top: auto;

      font-size: 0.7rem;
    }
  }

  @media (max-width: 380px) {
    .logo { font-size: 12px; letter-spacing: 3px; }
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const AREAS = [
  { name: 'Здоровье',      icon: '💪', desc: 'Как ты себя чувствуешь: энергия, сон, тело, питание', color: '#ef4444' },
  { name: 'Карьера',       icon: '💼', desc: 'Насколько тебя драйвит работа и есть ли рост',       color: '#f59e0b' },
  { name: 'Финансы',       icon: '💰', desc: 'Сколько зарабатываешь и хватает ли на жизнь и мечты', color: '#eab308' },
  { name: 'Отношения',     icon: '❤️', desc: 'Любовь, близость, есть ли свой человек рядом',        color: '#ec4899' },
  { name: 'Семья',         icon: '🏡', desc: 'Связь с родителями, детьми, ощущение корней',         color: '#a855f7' },
  { name: 'Окружение',     icon: '👥', desc: 'Люди вокруг (друзья, коллеги) + пространство, в котором живёшь — дом, порядок, атмосфера', color: '#6366f1' },
  { name: 'Саморазвитие',  icon: '📚', desc: 'Учишься ли новому, растёшь ли как личность',          color: '#06b6d4' },
  { name: 'Отдых',         icon: '🌴', desc: 'Хобби, путешествия, время для чистого кайфа',         color: '#10b981' },
];

const savedValues = localStorage.getItem('wheelOfLife');
const values = savedValues ? JSON.parse(savedValues) : AREAS.map(() => 5);

let currentIdx = null;

const CX = 250, CY = 250, R = 200;
const sectorsG = document.getElementById('sectors');
const labelsG  = document.getElementById('labels');

function polar(cx, cy, r, angle) {
  return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
}

function sectorPath(startAngle, endAngle, radius) {
  const [x1, y1] = polar(CX, CY, radius, startAngle);
  const [x2, y2] = polar(CX, CY, radius, endAngle);
  const large = endAngle - startAngle > Math.PI ? 1 : 0;
  return `M ${CX} ${CY} L ${x1} ${y1} A ${radius} ${radius} 0 ${large} 1 ${x2} ${y2} Z`;
}

function buildWheel() {
  sectorsG.innerHTML = '';
  labelsG.innerHTML = '';
  const step = (Math.PI * 2) / AREAS.length;
  const startOffset = -Math.PI / 2 - step / 2;

  AREAS.forEach((area, i) => {
    const a1 = startOffset + i * step;
    const a2 = a1 + step;
    const aMid = (a1 + a2) / 2;

    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    bg.setAttribute('d', sectorPath(a1, a2, R));
    bg.setAttribute('fill', area.color);
    bg.setAttribute('opacity', '0.15');
    bg.setAttribute('class', 'sector');
    bg.setAttribute('data-idx', i);
    bg.addEventListener('click', () => openModal(i));

    const fill = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    fill.setAttribute('d', sectorPath(a1, a2, R * values[i] / 10));
    fill.setAttribute('fill', area.color);
    fill.setAttribute('opacity', '0.85');
    fill.setAttribute('class', 'sector-fill');
    fill.setAttribute('data-idx', i);
    fill.style.pointerEvents = 'none';
    fill.style.color = area.color;

    sectorsG.appendChild(bg);
    sectorsG.appendChild(fill);

    const [lx, ly] = polar(CX, CY, R + 25, aMid);
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', lx);
    text.setAttribute('y', ly);
    text.setAttribute('class', 'sector-label');
    text.textContent = `${area.icon} ${area.name}`;
    labelsG.appendChild(text);
  });
}

function updateSector(i) {
  const step = (Math.PI * 2) / AREAS.length;
  const startOffset = -Math.PI / 2 - step / 2;
  const a1 = startOffset + i * step;
  const a2 = a1 + step;
  const fill = sectorsG.querySelector(`.sector-fill[data-idx="${i}"]`);
  if (fill) fill.setAttribute('d', sectorPath(a1, a2, R * values[i] / 10));
  updateAvg();
  saveToLocalStorage();
}

function updateAvg() {
  const avg = values.reduce((a,b) => a+b, 0) / values.length;
  const el = document.getElementById('avgText');
  animateNumber(el, parseFloat(el.textContent), avg, 600);
  if (avg >= 8) launchConfetti();
}

function animateNumber(el, from, to, duration) {
  const start = performance.now();
  function tick(t) {
    const p = Math.min(1, (t - start) / duration);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = (from + (to - from) * eased).toFixed(1);
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function openModal(i) {
  currentIdx = i;
  const area = AREAS[i];
  document.getElementById('modalTitle').textContent = `${area.icon} ${area.name}`;
  document.getElementById('modalDesc').textContent = area.desc;
  document.getElementById('modalDot').style.background = area.color;
  const slider = document.getElementById('slider');
  slider.value = values[i];
  document.getElementById('valueDisplay').textContent = values[i];
  document.getElementById('modal').classList.add('active');
}

document.getElementById('slider').addEventListener('input', e => {
  document.getElementById('valueDisplay').textContent = e.target.value;
});

function saveValue() {
  values[currentIdx] = parseInt(document.getElementById('slider').value);
  updateSector(currentIdx);
  document.getElementById('modal').classList.remove('active');
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('active');
});

function saveToLocalStorage() {
  localStorage.setItem('wheelOfLife', JSON.stringify(values));
}

function openShareMenu() {
  document.getElementById('shareMenu').classList.add('active');
}

function closeShareMenu() {
  document.getElementById('shareMenu').classList.remove('active');
}

document.getElementById('shareMenu').addEventListener('click', e => {
  if (e.target.id === 'shareMenu') closeShareMenu();
});

async function shareNative() {
  const avg = values.reduce((a, b) => a + b, 0) / values.length;
  const text = `Моё колесо баланса: ${avg.toFixed(1)}/10 🎡`;
  
  closeShareMenu();
  
  if (navigator.share) {
    try {
      await navigator.share({
        title: 'Balance — колесо баланса жизни',
        text: text,
        url: window.location.href
      });
    } catch (e) {}
  } else {
    copyLink();
  }
}

function copyLink() {
  closeShareMenu();
  navigator.clipboard.writeText(window.location.href).then(() => {
    showToast('🔗 Ссылка скопирована');
  }).catch(() => {
    showToast('❌ Не удалось скопировать');
  });
}

async function downloadWallpaper() {
  showToast('🎨 Генерируем обои...');
  closeShareMenu();
  
  const container = document.getElementById('wallpaperRender');
  const avg = values.reduce((a, b) => a + b, 0) / values.length;
  const dateStr = new Date().toLocaleDateString('ru-RU', { 
    day: 'numeric', month: 'long', year: 'numeric' 
  });
  
  const step = (Math.PI * 2) / AREAS.length;
  const startOffset = -Math.PI / 2 - step / 2;
  let wheelSvg = `<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="wpCenterGrad">
        <stop offset="0%" stop-color="#a855f7"/>
        <stop offset="100%" stop-color="#ec4899"/>
      </radialGradient>
    </defs>`;
  
  AREAS.forEach((area, i) => {
    const a1 = startOffset + i * step;
    const a2 = a1 + step;
    const [x1, y1] = polar(CX, CY, R, a1);
    const [x2, y2] = polar(CX, CY, R, a2);
    const large = a2 - a1 > Math.PI ? 1 : 0;
    const bgPath = `M ${CX} ${CY} L ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} Z`;
    wheelSvg += `<path d="${bgPath}" fill="${area.color}" opacity="0.15"/>`;
    
    const fillR = R * values[i] / 10;
    const [fx1, fy1] = polar(CX, CY, fillR, a1);
    const [fx2, fy2] = polar(CX, CY, fillR, a2);
    const fillPath = `M ${CX} ${CY} L ${fx1} ${fy1} A ${fillR} ${fillR} 0 ${large} 1 ${fx2} ${fy2} Z`;
    wheelSvg += `<path d="${fillPath}" fill="${area.color}" opacity="0.85"/>`;
    
    const aMid = (a1 + a2) / 2;
    const [lx, ly] = polar(CX, CY, R + 25, aMid);
    wheelSvg += `<text x="${lx}" y="${ly}" fill="#fff" font-size="12" font-weight="500" text-anchor="middle" font-family="-apple-system, sans-serif">${area.icon} ${area.name}</text>`;
  });
  
  wheelSvg += `
    <circle cx="250" cy="250" r="60" fill="rgba(10,10,26,0.85)" stroke="url(#wpCenterGrad)" stroke-width="2"/>
    <text x="250" y="245" fill="#fff" font-size="36" font-weight="200" text-anchor="middle" dominant-baseline="middle" font-family="-apple-system, sans-serif">${avg.toFixed(1)}</text>
    <text x="250" y="270" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle" letter-spacing="2" font-family="-apple-system, sans-serif">СРЕДНИЙ БАЛЛ</text>
  </svg>`;
  
  const areasHtml = AREAS.map((area, i) => `
    <div class="wp-area">
      <div class="wp-area-dot" style="background: ${area.color}; box-shadow: 0 0 12px ${area.color}"></div>
      <div class="wp-area-name">${area.icon} ${area.name}</div>
      <div class="wp-area-value">${values[i]}/10</div>
    </div>
  `).join('');
  
  container.innerHTML = `
    <div class="wp-inner">
      <div class="wp-title">BALANCE</div>
      <div class="wp-date">${dateStr}</div>
      <div class="wp-wheel-container">${wheelSvg}</div>
      <div class="wp-stats">
        <div class="wp-stat">
          <div class="wp-stat-value">${avg.toFixed(1)}</div>
          <div class="wp-stat-label">Средний балл</div>
        </div>
        <div class="wp-stat">
          <div class="wp-stat-value">${Math.min(...values)}</div>
          <div class="wp-stat-label">Минимум</div>
        </div>
        <div class="wp-stat">
          <div class="wp-stat-value">${Math.max(...values)}</div>
          <div class="wp-stat-label">Максимум</div>
        </div>
      </div>
      <div class="wp-areas">${areasHtml}</div>
      <div class="wp-footer">balance.app</div>
    </div>
  `;
  
  await new Promise(r => setTimeout(r, 100));
  
  try {
    const canvas = await html2canvas(container, {
      width: 2560,
      height: 1440,
      scale: 1,
      backgroundColor: null,
      useCORS: true
    });
    
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `balance-2k-${Date.now()}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('✅ Обои сохранены!');
    }, 'image/png');
  } catch (err) {
    console.error(err);
    showToast('❌ Ошибка при генерации');
  }
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.innerHTML = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ========== КЭШ ИИ-АНАЛИЗА ==========

const CACHE_KEY = 'aiAnalysisCache';
const CACHE_DURATION = 15 * 60 * 1000; // 15 минут

function getCachedAnalysis() {
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    if (!cached) return null;
    
    const data = JSON.parse(cached);
    const now = Date.now();
    
    // Проверяем, что оценки не менялись и кэш не устарел
    if (JSON.stringify(data.values) === JSON.stringify(values) && 
        (now - data.timestamp) < CACHE_DURATION) {
      return data.response;
    }
    
    return null;
  } catch (e) {
    return null;
  }
}

function saveCachedAnalysis(response) {
  try {
    const cache = {
      values: [...values],
      response: response,
      timestamp: Date.now()
    };
    localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
  } catch (e) {
    console.error('Cache save error:', e);
  }
}

async function showRecommendations() {
  const panel = document.getElementById('recPanel');
  const content = document.getElementById('recContent');
  
  panel.classList.add('active');
  
  // Проверяем кэш
  const cached = getCachedAnalysis();
  if (cached) {
    // Показываем из кэша мгновенно
    content.innerHTML = `
      <div class="ai-loader">
        <div class="ai-loader-orb"></div>
        <div class="ai-loader-text">Загружаем анализ...</div>
      </div>
    `;
    
    // Небольшая задержка для визуального эффекта
    await new Promise(r => setTimeout(r, 300));
    renderAIAnalysis(cached, true);
    return;
  }
  
  // Кэша нет — показываем лоадер и делаем запрос
  content.innerHTML = `
    <div class="ai-loader">
      <div class="ai-loader-orb"></div>
      <div class="ai-loader-text">
        ИИ анализирует твоё колесо<span class="ai-loader-dots"></span>
      </div>
    </div>
  `;
  
  try {
    const analysis = await fetchAIAnalysis();
    saveCachedAnalysis(analysis); // Сохраняем в кэш
    renderAIAnalysis(analysis, false);
  } catch (err) {
    console.error('AI error:', err);
    content.innerHTML = `
      <div class="rec-item">
        <div class="rec-item-text">
          😔 Не удалось связаться с ИИ. Проверь интернет и попробуй ещё раз.<br>
          <small style="opacity:0.6; display:block; margin-top:8px;">${err.message}</small>
        </div>
      </div>
    `;
  }
}

async function fetchAIAnalysis() {
  const avg = values.reduce((a, b) => a + b, 0) / values.length;
  const min = Math.min(...values);
  const max = Math.max(...values);
  
  const areasData = AREAS.map((area, i) => {
    if (area.name === 'Окружение') {
      return `- ${area.name} (люди вокруг + дом, порядок, пространство): ${values[i]}/10`;
    }
    return `- ${area.name}: ${values[i]}/10`;
  }).join('\n');
  
  const systemPrompt = `Ты — тёплый и конкретный помощник, который помогает человеку разобраться в своей жизни. Ты говоришь как хороший друг: просто, по-человечески, без пафоса и заумных слов.

ПРАВИЛА ЯЗЫКА (СТРОГО):
- Отвечай ТОЛЬКО на русском языке. Ни одного слова на английском, кроме имён собственных.
- НЕ используй англицизмы: никаких "ресурс", "инсайт", "дренаж", "выгорание", "осознанность", "поток", "энергия" в психологическом смысле.
- Вместо них — простые русские слова: "силы", "понимание", "усталость", "внимание", "настроение".
- Пиши короткими предложениями. Одно предложение — одна мысль.
- Никаких клише вроде "всё в твоих руках", "верь в себя", "ты можешь всё".
- Никаких психологических терминов. Объясняй так, чтобы понял даже подросток.
- Обращайся на "ты", как друг.
- Будь конкретным: не "займись спортом", а "пройди 30 минут пешком после работы".

СФЕРА "ОКРУЖЕНИЕ" включает две вещи:
1) Люди вокруг — друзья, коллеги, знакомые, с кем ты общаешься
2) Пространство, где ты живёшь — дом, комната, порядок, чистота, атмосфера
Когда говоришь про Окружение, учитывай обе стороны. Если оценка низкая — подумай, что именно не так: люди забирают силы или дома бардак давит. Если высокая — отметь, что и люди хорошие, и дома уютно.`;
  
  const userPrompt = `Человек оценил свою жизнь по 8 сферам от 0 до 10:

${areasData}

Статистика:
- Средний балл: ${avg.toFixed(1)}

Проанализируй ситуацию и верни СТРОГО валидный JSON без markdown-обёрток, без комментариев, без \`\`\`. ВСЕ текстовые поля — на русском языке:

{
  "summary": "2-3 коротких предложения о том, что ты видишь. Говори как друг, просто и честно. На русском языке.",
  "status": "одно из: excellent / good / needs_attention / critical",
  "focus": [
    {
      "area": "точное название сферы из списка выше",
      "icon": "эмодзи этой сферы",
      "value": число,
      "advice": "конкретный совет на 2-4 коротких предложения. Что сделать на этой неделе. Простыми словами, без заумных выражений. На русском языке."
    }
  ],
  "strengths": "1-2 коротких предложения о том, что у человека уже хорошо и на что можно опереться. На русском языке.",
  "nextStep": "один маленький конкретный шаг на ближайшие 7 дней. Простая инструкция, а не абстракция. На русском языке."
}

Правила:
- В массив "focus" включи 2-4 сферы: самые низкие оценки ИЛИ самые большие перекосы.
- Не включай в focus сферы с оценкой 8 и выше.
- Все тексты — строго на русском языке. Ни одного английского слова.
- Пиши коротко, просто, по-человечески.
- Ответ — ТОЛЬКО JSON, ничего больше.`;

  // ИСПРАВЛЕНИЕ: используем правильный OpenAI-совместимый эндпоинт
  const response = await fetch('https://text.pollinations.ai/openai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: userPrompt }
      ],
      model: 'openai',
      response_format: { type: "json_object" }, // Стандартный способ запроса JSON
      temperature: 0.5
    })
  });
  
  if (!response.ok) {
    const errText = await response.text();
    throw new Error(`Ошибка API (${response.status}): ${errText}`);
  }
  
  const data = await response.json();
  let text = data.choices?.[0]?.message?.content?.trim();
  
  if (!text) {
    throw new Error('Пустой ответ от ИИ');
  }
  
  // Очистка от возможных markdown-обёрток, если модель всё же их добавила
  if (text.startsWith('```')) {
    text = text.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/, '');
  }
  
  const parsed = JSON.parse(text);
  if (!parsed.summary || !Array.isArray(parsed.focus) || !parsed.nextStep) {
    throw new Error('Неверная структура ответа ИИ');
  }
  
  return parsed;
}

function renderAIAnalysis(data, fromCache) {
  const content = document.getElementById('recContent');
  
  const statusMap = {
    'excellent': { label: '🌟 Отличный баланс', color: '#10b981' },
    'good': { label: '✨ Хороший баланс', color: '#06b6d4' },
    'needs_attention': { label: '⚠️ Есть зоны роста', color: '#f59e0b' },
    'critical': { label: '🔥 Требует внимания', color: '#ef4444' }
  };
  
  const status = statusMap[data.status] || statusMap['needs_attention'];
  
  let html = `
    <div class="balance-indicator">
      <div class="balance-score" style="color: ${status.color}">${(values.reduce((a,b) => a+b, 0) / values.length).toFixed(1)}</div>
      <div class="balance-label">${status.label}</div>
      <div class="balance-summary">${data.summary}</div>
    </div>
  `;
  
  if (data.focus && data.focus.length > 0) {
    html += `
      <div class="rec-section">
        <div class="rec-section-title">🎯 На что обратить внимание</div>
    `;
    
    data.focus.forEach((item, idx) => {
      html += `
        <div class="rec-item" style="animation-delay: ${idx * 0.1}s">
          <div class="rec-item-header">
            <span class="rec-item-icon">${item.icon || '🎯'}</span>
            <span class="rec-item-title">${item.area}</span>
            <span class="rec-item-value">${item.value}/10</span>
          </div>
          <div class="rec-item-text">${item.advice}</div>
        </div>
      `;
    });
    
    html += `</div>`;
  }
  
  if (data.strengths) {
    html += `
      <div class="rec-section">
        <div class="rec-section-title">💪 Твои опоры</div>
        <div class="rec-item">
          <div class="rec-item-text">${data.strengths}</div>
        </div>
      </div>
    `;
  }
  
  if (data.nextStep) {
    html += `
      <div class="rec-section">
        <div class="next-step-card">
          <div class="next-step-title">
            <span>🚀</span>
            <span>Шаг на эту неделю</span>
          </div>
          <div class="next-step-text">${data.nextStep}</div>
        </div>
      </div>
    `;
  }
  
  // Пометка о кэше
  if (fromCache) {
    html += `<div class="cache-hint">💾 Анализ из кэша · Измени оценки для нового анализа</div>`;
  }
  
  content.innerHTML = html;
}

function closeRecommendations() {
  document.getElementById('recPanel').classList.remove('active');
}

function launchConfetti() {
  const colors = ['#a855f7', '#ec4899', '#f59e0b', '#10b981', '#06b6d4'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.5 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

function spawnParticles() {
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    const duration = 10 + Math.random() * 10;
    const delay = -Math.random() * duration;
    p.style.setProperty('--duration', duration + 's');
    p.style.setProperty('--delay', delay + 's');
    p.style.background = `hsla(${Math.random() * 360}, 70%, 60%, 0.4)`;
    document.body.appendChild(p);
  }
}
